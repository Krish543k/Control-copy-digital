<!DOCTYPE html>
<html>
<head><title>index.html Fixer</title>
<style>body{font-family:monospace;padding:20px;} button{padding:10px 20px;background:#667eea;color:white;border:none;border-radius:5px;cursor:pointer;font-size:15px;} pre{background:#f5f5f5;padding:10px;border-radius:5px;margin-top:10px;}</style>
</head>
<body>
<h2>index.html Orphan Code Fixer</h2>
<p>1. Select your <b>index.html</b> file below<br>2. Click <b>Fix & Download</b><br>3. Replace your project's index.html with the downloaded file</p>
<input type="file" id="fileInput" accept=".html"><br><br>
<button onclick="fixFile()">Fix &amp; Download</button>
<pre id="log">Waiting...</pre>
<script>
function fixFile() {
    const file = document.getElementById('fileInput').files[0];
    if (!file) { alert('Please select index.html first!'); return; }
    const reader = new FileReader();
    reader.onload = function(e) {
        let content = e.target.result;
        const log = document.getElementById('log');
        log.textContent = '';

        const origLen = content.length;

        // Find orphan start: after downloadAPK closing brace, floating doc. code
        // Pattern: "toggleMenu();\n} \n        doc." or "toggleMenu();\n}\n        doc."
        // Find "function logoutApp" position
        const logoutIdx = content.indexOf('\nfunction logoutApp');
        if (logoutIdx === -1) {
            log.textContent += 'ERROR: Could not find "function logoutApp" in file!\n';
            return;
        }
        log.textContent += 'Found logoutApp at index: ' + logoutIdx + '\n';

        // Find the orphan start — look backwards from logoutApp for "doc." floating code
        // The orphan starts right after downloadAPK's closing brace
        // Find the last "toggleMenu();\n}" before logoutApp
        const searchArea = content.substring(0, logoutIdx);
        
        // Find downloadAPK function - there may be two, we want the first one (real one)
        const firstAPK = content.indexOf('function downloadAPK()');
        const secondAPK = content.indexOf('function downloadAPK()', firstAPK + 10);
        
        log.textContent += 'First downloadAPK at: ' + firstAPK + '\n';
        log.textContent += 'Second downloadAPK at: ' + secondAPK + '\n';

        if (secondAPK !== -1) {
            // Remove from just after first downloadAPK's closing brace to end of second downloadAPK's closing brace
            // Find end of first downloadAPK function
            let firstEnd = content.indexOf('\n}', firstAPK);
            firstEnd = content.indexOf('\n}', firstEnd + 1); // skip inner braces
            // Actually find the closing } of downloadAPK by counting braces
            let braceCount = 0;
            let inFunc = false;
            let funcEnd = firstAPK;
            for (let i = firstAPK; i < content.length; i++) {
                if (content[i] === '{') { braceCount++; inFunc = true; }
                if (content[i] === '}') { braceCount--; }
                if (inFunc && braceCount === 0) { funcEnd = i; break; }
            }
            log.textContent += 'First downloadAPK ends at: ' + funcEnd + '\n';
            
            // Find end of second downloadAPK
            let braceCount2 = 0;
            let inFunc2 = false;
            let funcEnd2 = secondAPK;
            for (let i = secondAPK; i < content.length; i++) {
                if (content[i] === '{') { braceCount2++; inFunc2 = true; }
                if (content[i] === '}') { braceCount2--; }
                if (inFunc2 && braceCount2 === 0) { funcEnd2 = i; break; }
            }
            log.textContent += 'Second downloadAPK ends at: ' + funcEnd2 + '\n';

            // Remove: from funcEnd+1 to funcEnd2+1 (everything between first and second downloadAPK end)
            const removed = content.substring(funcEnd + 1, funcEnd2 + 1);
            log.textContent += 'Removing ' + removed.length + ' chars of orphan code\n';
            log.textContent += 'Preview: ' + JSON.stringify(removed.substring(0, 100)) + '\n';
            content = content.substring(0, funcEnd + 1) + '\n' + content.substring(funcEnd2 + 1);
        } else {
            // Only one downloadAPK — find orphan by looking for floating doc. code
            const docPattern = /\}\s*[\r\n][ \t]*doc\.(setFontSize|setTextColor|text)\(/;
            const m = docPattern.exec(content);
            if (m) {
                const orphanStart = m.index + 1; // after the }
                content = content.substring(0, orphanStart) + '\n' + content.substring(logoutIdx);
                log.textContent += 'Removed orphan via doc. pattern\n';
            } else {
                log.textContent += 'No orphan found - file may already be clean!\n';
            }
        }

        log.textContent += '\nOriginal size: ' + origLen + ' chars\n';
        log.textContent += 'Fixed size: ' + content.length + ' chars\n';
        log.textContent += 'Removed: ' + (origLen - content.length) + ' chars\n';

        // Download
        const blob = new Blob([content], {type: 'text/html;charset=utf-8'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'index.html';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        log.textContent += '\n✅ Fixed index.html downloaded! Replace your project file with it.\n';
    };
    reader.readAsText(file, 'utf-8');
}
</script>
</body>
</html>
